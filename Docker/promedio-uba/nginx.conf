# nginx.conf — Configuración de Nginx para PromedioUBA
# Optimizada para servir archivos estáticos y correr como usuario no-root.

# El worker process hereda el usuario definido por la instrucción USER del Dockerfile.
# No necesitamos declarar 'user' aquí porque ya lo maneja Docker.
worker_processes auto;

# Ruta del PID accesible por el usuario no-root (configurada en el Dockerfile con chown)
pid /var/run/nginx.pid;

# Archivo de error global
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Tipos MIME correctos para HTML, CSS y JS
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log de acceso
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    # Optimizaciones de performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Compresión gzip para assets
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 1024;

    server {
        # Puerto interno del contenedor (el EXPOSE del Dockerfile)
        listen 80;
        server_name localhost;

        # Directorio raíz: coincide con el WORKDIR del Dockerfile
        root /usr/share/nginx/html;
        index index.html;

        # Ruta principal: sirve la SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Endpoint de healthcheck (usado por el HEALTHCHECK del Dockerfile)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Cache de assets estáticos (CSS, JS, imágenes)
        location ~* \.(css|js|png|jpg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cabeceras de seguridad HTTP
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection      "1; mode=block" always;
    }
}
